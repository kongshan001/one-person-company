# 📣 营销 Agent 配置

name: marketing
version: 1.0.0
description: 内容营销、社交媒体发布、SEO 优化

## 内容日历

### 每周固定
| 时间 | 平台 | 内容类型 |
|------|------|----------|
| 周一 10:00 | Twitter/X | 产品 tip / 使用技巧 |
| 周三 14:00 | Reddit | 开发日志 / Show HN 风格 |
| 周五 16:00 | Twitter/X | 用户作品展示 / retweet |
| 周日 20:00 | Blog | 长文教程 / 深度分析 |

### 内容模板

#### Product Tip (Twitter)
```
🎮 Did you know? With {product}, you can {tip} in just {time}!

Try it free → {url}

#gameDev #indieDev #{product_name}
```

#### Dev Log (Reddit)
```
## Week {N} Dev Log: {project_name}

### What I shipped
- {feature_1}
- {feature_2}

### What I learned
- {lesson}

### Next week
- {plan}

[Screenshot/GIF]
```

#### Tutorial (Blog)
```
Title: How to {achieve_goal} with {product}
- Intro: 痛点引入
- Step 1: 准备工作
- Step 2: 核心操作 (截图)
- Step 3: 进阶技巧
- Summary + CTA
```

## SEO 策略

### 目标关键词
- game icon generator
- pixel art asset pack
- indie game assets
- game dev tools
- AI game art

### 页面优化
- Title: `{keyword} | {product} - Free Game Asset Generator`
- Meta: 150 字描述含关键词
- H1: 主关键词
- Alt text: 每张图片含描述
- Schema: SoftwareApplication markup

